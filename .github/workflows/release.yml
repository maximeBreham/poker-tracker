name: Release

# Déclenché en poussant un tag de version (ex. v0.1.0), ou manuellement.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (M1+)
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-targets: "aarch64-apple-darwin"
          # Linux (AppImage + .deb)
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          # Windows (.exe NSIS + .msi)
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Dépendances système Linux (Tauri)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            build-essential curl wget file libssl-dev

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Dépendances frontend
        run: npm ci

      - name: Build + Release (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Poker Tracker ${{ github.ref_name }}"
          releaseBody: |
            Installeurs desktop pour Windows, macOS (Apple Silicon) et Linux.

            ⚠️ Application **non signée** pour l'instant :
            - Windows : SmartScreen → « Informations complémentaires » → « Exécuter quand même ».
            - macOS : clic-droit sur l'app → « Ouvrir ». Si « app endommagée » :
              `xattr -dr com.apple.quarantine /Applications/poker-tracker.app`

            100 % local : aucune donnée ne quitte la machine.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
